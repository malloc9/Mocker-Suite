name: Quality Checks
on: [push, pull_request]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 11.1.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm format
      - run: git diff --exit-code -- ':!node_modules' || (echo "Files need formatting. Please run pnpm format and commit the changes."; exit 1)
      - run: pnpm run lint
      - run: pnpm run test