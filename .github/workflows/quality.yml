name: Quality Checks
on: [push, pull_request]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@11.1.2 --activate
      - run: echo "$HOME/.local/share/corepack/bin" >> $GITHUB_PATH
      - run: pnpm install
      - run: pnpm format
      - run: git diff --exit-code || (echo "Files need formatting. Please run pnpm format and commit the changes."; exit 1)
      - run: pnpm run lint
      - run: pnpm run test